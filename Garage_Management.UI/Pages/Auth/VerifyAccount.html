<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác minh tài khoản - MGMS</title>
    <link rel="stylesheet" href="../../wwwroot/css/auth.css">
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header" id="header-placeholder"></header>

    <div class="login-page">
        <div class="login-sidebar"><div class="overlay"></div></div>
        <div class="login-main">
            <div class="login-box">
                <h1 class="brand-title">Xác Minh OTP</h1>
                <p class="sub-title">Mã xác thực đã được gửi đến số điện thoại của bạn</p>

                <form id="verify-form">
                    <div class="input-group">
                        <label>Nhập mã OTP (6 chữ số)</label>
                        <input type="text" id="otp-code" placeholder="xxxxxx" maxlength="6" required 
                               style="text-align: center; letter-spacing: 5px; font-size: 24px;">
                    </div>

                    <button type="submit" class="btn-submit">KÍCH HOẠT TÀI KHOẢN</button>
                </form>

                <div class="auth-footer" style="flex-direction: column; gap: 10px; border: none;">
                    <p>Không nhận được mã?</p>
                    <button type="button" id="resend-otp-verify" class="link-item highlight" style="background: none; border: none; cursor: pointer;">
                        <i class="fa-solid fa-rotate-right"></i> Gửi lại mã
                    </button>
                </div>
                
                <p id="msg-display" class="message"></p>
            </div>
        </div>
    </div>

    <script src="/FrontEnd_Garage_Management/Garage_Management.UI/wwwroot/js/common.js"></script>
    <script type="module" src="../../wwwroot/js/auth/verify-main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - MGMS</title>
    <link rel="stylesheet" href="../../wwwroot/css/auth.css">
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-sidebar"><div class="overlay"></div></div>
        <div class="login-main">
            <div class="login-box">
                <h1 class="brand-title">Đăng Ký</h1>
                <p class="sub-title">Tạo tài khoản để nhận ưu đãi từ MGMS</p>

                <form id="register-form">
                    <div class="input-row" style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 1;">
                            <label for="lastName">Họ</label>
                            <input type="text" id="lastName" placeholder="Vd: Nguyễn" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label for="firstName">Tên</label>
                            <input type="text" id="firstName" placeholder="Vd: An" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-phone">Số Điện Thoại</label>
                        <input type="tel" id="reg-phone" placeholder="Vd: 0912345678" maxlength="10" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-password">Mật Khẩu</label>
                        <input type="password" id="reg-password" placeholder="Tối thiểu 9 ký tự, 1 hoa, 1 số" required>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Nhập Lại Mật Khẩu</label>
                        <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" onpaste="return false;" required>
                    </div>

                    <button type="submit" id="btn-register" class="btn-submit">ĐĂNG KÝ NGAY</button>
                </form>

                <div class="auth-footer" style="justify-content: center; border: none;">
                    <span>Đã có tài khoản? <a href="Login.html" class="link-item">Đăng nhập</a></span>
                </div>
                <p id="msg-display" class="message"></p>
            </div>
        </div>
    </div>
    <script type="module" src="../../wwwroot/js/auth/register-main.js"></script>
</body>
</html>

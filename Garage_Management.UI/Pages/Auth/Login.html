<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MGMS</title>
    <!-- <base href="/FrontEnd_Garage_Management/Garage_Management.UI/"> -->
     <link rel="stylesheet" href="../../wwwroot/css/auth.css">
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="main-header" id="header-placeholder"></header>

    <div class="login-page">
        <div class="login-sidebar">
            <div class="overlay"></div>
        </div>

        <div class="login-main">
            <div class="login-box">
                <h1 class="brand-title">Đăng Nhập</h1>
                <p class="sub-title">Vui lòng chọn phương thức để đăng nhập</p>

                <div class="tabs">
                    <button type="button" class="tab-btn active" data-mode="password">MẬT KHẨU</button>
                    <button type="button" class="tab-btn" data-mode="otp">MÃ OTP</button>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label>Số Điện Thoại</label>
                        <input type="text" id="phone" placeholder="Nhập số điện thoại" required>
                    </div>

                    <div id="password-field" class="input-group">
                        <label>Mật Khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu">
                    </div>

                    <div id="otp-field" class="input-group hidden">
                        <label>Nhập mã xác nhận OTP</label>
                        <div class="otp-wrapper">
                            <input type="text" id="otp" placeholder="6 chữ số">
                            <button type="button" id="send-otp-btn">Gửi Mã OTP</button>
                        </div>
                        <div class="resend-otp">
                            <i class="fa-solid fa-rotate-right"></i> Gửi lại mã xác thực
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
                </form>
                
                <div class="auth-footer">
                    <a href="#" class="link-item">QUÊN MẬT KHẨU?</a>
                    <a href="#" class="link-item highlight"><i class="fa-solid fa-arrow-right-to-bracket"></i> ĐĂNG KÝ</a>
                </div>
                
                <p id="msg-display" class="message"></p>
            </div>
        </div>
    </div>

    <script src="../../wwwroot/js/common.js"></script>
    <script type="module" src="../../wwwroot/js/auth/auth-main.js"></script>
</body>
</html>

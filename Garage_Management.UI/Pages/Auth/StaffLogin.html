<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MGMS</title>
    <!-- <base href="/FrontEnd_Garage_Management/Garage_Management.UI/"> -->
    <link rel="stylesheet" href="../../wwwroot/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <h1 class="brand-title">NHÂN VIÊN</h1>
    <p class="sub-title">Đăng nhập hệ thống quản lý nội bộ</p>

    <form id="login-form">
        <div class="input-group">
            <label>Email</label>
            <input type="text" id="Email" placeholder="Nhập tài khoản nhân viên" required>
        </div>

        <div id="password-field" class="input-group">
            <label>Mật Khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>

        <button type="submit" class="btn-submit">ĐĂNG NHẬP HỆ THỐNG</button>
    </form>
    <p id="msg-display" class="message"></p>

    <script src="/FrontEnd_Garage_Management/Garage_Management.UI/wwwroot/js/common.js"></script>
    <script type="module" src="../../wwwroot/js/auth/staff-main.js"></script>
</body>

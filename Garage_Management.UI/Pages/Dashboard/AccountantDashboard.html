<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Dashboard - MGMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../wwwroot/css/accountant-dashboard.css">
</head>
<body class="bg-light">
    <!-- Accountant Navigation Header -->
    <nav class="navbar navbar-dark accountant-navbar mb-4">
        <div class="container-fluid">
            <div class="accountant-nav-container">
                <div class="accountant-brand">
                    <i class="fas fa-calculator"></i>
                    MGMS
                </div>
                <!-- cho ra giữa cho tôi -->
                <ul class="accountant-nav-menu" style="padding: 100px auto;">
                    <li class="accountant-nav-item">
                        <a href="AccountantDashboard.html" class="accountant-nav-link active" data-page="AccountantDashboard.html">
                            <i class="fas fa-file-invoice"></i>
                            Danh sách hóa đơn
                        </a>
                    </li>
                    <li class="accountant-nav-item">
                        <a href="AddSparePartPrice.html" class="accountant-nav-link" data-page="AddSparePartPrice.html">
                            <i class="fas fa-tools"></i>
                            Giá phụ tùng
                        </a>
                    </li>
                    <li class="accountant-nav-item">
                        <a href="AddServicePrice.html" class="accountant-nav-link" data-page="AddServicePrice.html">
                            <i class="fas fa-wrench"></i>
                            Giá dịch vụ
                        </a>
                    </li>
                    <li class="accountant-nav-item">
                        <a href="RevenueStatistics.html" class="accountant-nav-link" data-page="RevenueStatistics.html">
                            <i class="fas fa-chart-bar"></i>
                            Thống kê doanh thu
                        </a>
                    </li>
                </ul>
                
                <div class="accountant-user-section">
                    <span id="user-display-name">Xin chào, Khách!</span>
                    <button id="btn-logout-header" class="btn">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container accountant-container">
        <div class="accountant-card shadow-sm">
            <div class="accountant-card-header">
                <h5><i class="fas fa-list"></i> Danh sách Hóa đơn</h5>
            </div>
            <div class="accountant-card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Mã HD</th>
                            <th>Khách hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thanh toán lúc</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { authGuard } from '../../wwwroot/js/auth/auth-guard.js';
        import { PaymentAPI } from '../../wwwroot/js/payment/payment-api.js';
        import { PaymentUI } from '../../wwwroot/js/payment/payment-ui.js';
        import { initAccountantNavigation, updateHeaderUI } from '../../wwwroot/js/payment/accountant-nav.js';

        // Kiểm tra quyền Accountant
        authGuard.authorize('Accountant');

        // Khởi tạo navigation
        initAccountantNavigation();
        updateHeaderUI();

        // Load invoices khi trang được tải
        document.addEventListener('DOMContentLoaded', async () => {
            await loadInvoices();
        });

        async function loadInvoices() {
            try {
                const result = await PaymentAPI.getInvoices();
                if (result.success) {
                    PaymentUI.renderInvoices(result);
                } else {
                    console.error("API trả về lỗi:", result.message);
                    document.getElementById('invoiceTableBody').innerHTML = 
                        '<tr><td colspan="5" class="text-center text-danger">Lỗi khi tải dữ liệu</td></tr>';
                }
            } catch (error) {
                console.error("Lỗi kết nối API:", error);
                document.getElementById('invoiceTableBody').innerHTML = 
                    '<tr><td colspan="5" class="text-center text-danger">Lỗi kết nối</td></tr>';
            }
        }
    </script>
</body>
</html>

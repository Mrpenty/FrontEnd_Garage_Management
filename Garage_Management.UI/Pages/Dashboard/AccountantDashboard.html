<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Dashboard - MGMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .qr-container { text-align: center; padding: 20px; border: 1px dashed #ccc; }
        #qrCodeImage { max-width: 250px; margin-bottom: 15px; }
        .status-paid { color: green; font-weight: bold; }
        .status-unpaid { color: red; font-weight: bold; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">MGMS - Quản lý Thanh toán</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Danh sách Hóa đơn cần thanh toán</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Mã HD</th>
                            <th>Khách hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thanh toán Hóa đơn #<span id="modalInvoiceId"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="invoiceDetailContent" class="mb-4 p-3 bg-light rounded border shadow-sm small">
                        Đang tải chi tiết...
                    </div>
                    <div id="paymentOptions">
                        <p>Chọn phương thức thanh toán:</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary btn-lg" onclick="handleCashPayment()">
                                <i class="fa-solid fa-money-bill-1-wave"></i> Thanh toán tiền mặt
                            </button>
                            <button class="btn btn-outline-success btn-lg" onclick="handleBankTransfer()">
                                <i class="fa-solid fa-qrcode"></i> Chuyển khoản VietQR
                            </button>
                        </div>
                    </div>

                    <div id="qrSection" class="qr-container d-none">
                        <h6>Quét mã để thanh toán</h6>
                        <img id="qrCodeImage" src="" alt="QR Code">
                        <div class="text-start small">
                            <p><strong>Ngân hàng:</strong> <span id="bankName"></span></p>
                            <p><strong>Số TK:</strong> <span id="accNumber"></span></p>
                            <p><strong>Chủ TK:</strong> <span id="accName"></span></p>
                            <p><strong>Nội dung:</strong> <code id="transContent"></code></p>
                        </div>
                        <div class="alert alert-info py-2 mt-2 small">
                            Hệ thống sẽ tự động cập nhật sau khi nhận được tiền.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../wwwroot/js/payment/payment-main.js"></script>
    <script type="module">
        import { openPaymentModal, handleCashPayment, handleBankTransfer } from '../../wwwroot/js/payment/payment-main.js';
        window.openPaymentModal = openPaymentModal;
        window.handleCashPayment = handleCashPayment;
        window.handleBankTransfer = handleBankTransfer;
    </script>
</body>
</html>

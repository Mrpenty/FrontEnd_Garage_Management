<!DOCTYPE html>
<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGMS - Hệ thống quản lý Gara xe máy</title>
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">

<body>
    <header class="main-header" id="header-placeholder"></header>

    <section class="hero-banner">
        <div class="overlay"></div>
        <div class="container hero-content">
            <h3>MGMS - Motorcycle Garage Management System</h3>
            <h1>XƯỞNG SỬA CHỮA XE MÁY UY TÍN TẠI HÀ NỘI</h1>

            <div class="hero-actions">

                    </div>
                </div>

        </div>

    <section class="services-section">
        <div class="container">
            <h2 class="section-title">DỊCH VỤ TẠI MGMS</h2>
            <div class="service-grid">
            </div>
        </div>
    </section>
    <div id="service-detail-modal" class="modal">
        <div class="modal-content service-modal-width">
            <span class="close-modal">&times;</span>
            <div id="service-detail-content">
                </div>

    <script type="module" src="../../wwwroot/js/common.js"></script>

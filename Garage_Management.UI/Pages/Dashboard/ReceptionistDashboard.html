<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Dashboard - MGMS</title>
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">
    <link rel="stylesheet" href="../../wwwroot/css/receptionist-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-user">
                <i class="fa-solid fa-circle-user"></i>
                <div class="user-info">
                    <span id="staff-name">Đang tải...</span>
                    <small>Lễ tân</small>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active" id="menu-garage">
                        <a href="#"><i class="fa-solid fa-gauge"></i> Quản lý gara</a>
                    </li>
                    <li id="menu-appointment">
                        <a href="#"><i class="fa-solid fa-calendar-plus"></i> Đặt lịch</a>
                    </li>
                    <li id="menu-customers"> 
                        <a href="#"><i class="fa-solid fa-users"></i> Khách hàng</a>
                    </li>
                    <li>
                        <a href="#"><i class="fa-solid fa-chart-line"></i> Báo cáo</a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button id="btn-staff-logout" class="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                </button>
            </div>
        </aside>

        <main class="main-content" id="main-display">
        </main>

        <div id="printPreviewModal" class="modal" style="z-index: 9999; display: none;">
            <div class="modal-content" style="max-width: 800px;">
                <div class="modal-header">
                    <h3>Xem trước bản in</h3>
                    <span class="close-modal" onclick="closePrintModal()">&times;</span>
                </div>
                <div class="modal-body" style="background: #525659; padding: 30px; display: flex; justify-content: center;">
                    <div id="printablePaper" class="a5-paper"></div> </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick="closePrintModal()">Đóng</button>
                    <button class="btn-primary" onclick="executePrint()">In ngay</button>
                </div>
            </div>
        </div>

        <div class="modal fade" id="estimateModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Xử lý duyệt báo giá hộ khách</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p class="text-center">Đang tải dữ liệu...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="paymentModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thanh toán</h5>
                <button type="button" class="btn-close close-modal" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body"> 
                </div>
        </div>
    </div>
</div>
    <script type="module">
        import { authGuard } from '../../wwwroot/js/auth/auth-guard.js';
        import CONFIG from '../../wwwroot/js/config.js';
        import { initJobCardModule } from '../../wwwroot/js/jobcard/jobcard-main.js';
        import { initAppointmentModule } from '../../wwwroot/js/appointment/appointment-main.js';
        import { initCustomerModule } from '../../wwwroot/js/user/customer-main.js';

        // 1. Kiểm tra quyền
        authGuard.authorize('Receptionist'); 

        // 2. Hiển thị tên nhân viên
        const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        document.getElementById('staff-name').innerText = userInfo.fullName || "Nhân viên";

        // 3. Logic điều hướng Menu
        const mainDisplay = document.getElementById('main-display');
        const menuGarage = document.getElementById('menu-garage');
        const menuApt = document.getElementById('menu-appointment');
        const menuCust = document.getElementById('menu-customers');

        function clearActiveMenu() {
            document.querySelectorAll('.sidebar-nav li').forEach(li => li.classList.remove('active'));
        }

        menuGarage.onclick = (e) => {
            e.preventDefault();
            if(menuGarage.classList.contains('active')) return;
            clearActiveMenu();
            menuGarage.classList.add('active');
            initJobCardModule(); // Nạp lại JobCard
        };

        menuApt.onclick = (e) => {
            e.preventDefault();
            if(menuApt.classList.contains('active')) return;
            clearActiveMenu();
            menuApt.classList.add('active');
            initAppointmentModule(); // Nạp lại Appointment
        };

        menuCust.onclick = (e) => {
            e.preventDefault();
            if(menuCust.classList.contains('active')) return;
            clearActiveMenu();
            menuCust.classList.add('active');
            initCustomerModule(); // Gọi hàm khởi tạo module khách hàng
        };

        // 4. Đăng xuất
        document.getElementById('btn-staff-logout').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = CONFIG.PAGES.STAFF_LOGIN;
        });

        // Khởi tạo mặc định khi vừa vào trang
        initJobCardModule();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGMS - Hệ thống quản lý Gara xe máy</title>
    <link rel="stylesheet" href="../../wwwroot/css/booking.css">
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header" id="header-placeholder"></header>

<section class="booking-container">
    <div class="container">
            <!-- STEP BAR -->
            <div class="step-bar">
                <div class="step active" data-step="0">Chọn xe</div>
                <div class="step" data-step="1">Dịch vụ</div>
                <div class="step" data-step="2">Chọn phụ kiện</div>
                <div class="step" data-step="3">Thông tin đặt hẹn</div>
                <div class="step" data-step="4">Hoàn thành</div>
            </div>
            <!-- STEP 0 -->
            <div class="step-content active" id="step-0">
                <h3>ĐẶT LỊCH HẸN</h3>

                <div id="vehicle-options-toggle" style="display: none; margin-bottom: 20px; text-align: center;">
                    <button type="button" class="btn-toggle active" id="btn-my-vehicle" onclick="toggleVehicleSource('mine')">Xe của tôi</button>
                    <button type="button" class="btn-toggle" id="btn-new-vehicle" onclick="toggleVehicleSource('new')">Thêm xe mới</button>
                </div>

                <div class="vehicle-selection">
                    <div id="my-vehicle-group" class="form-group" style="display: none;">
                        <label>Chọn xe của bạn</label>
                        <select id="myVehicles">
                            <option value="">-- Đang tải danh sách xe --</option>
                        </select>
                    </div>

                    <div id="new-vehicle-group">
                        <div class="form-group">
                            <label>Hãng xe</label>
                            <div class="input-group-custom">
                                <select id="vehicleBrand">
                                    <option value="">-- Chọn hãng xe --</option>
                                </select>
                                <input type="text" id="customBrand" class="hidden" placeholder="Nhập hãng xe khác...">
                                <button type="button" class="btn-add-custom" onclick="toggleCustomInput('Brand')">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Loại xe</label>
                            <div class="input-group-custom">
                                <select id="vehicleModel" disabled>
                                    <option value="">-- Chọn loại xe --</option>
                                </select>
                                <input type="text" id="customModel" class="hidden" placeholder="Nhập loại xe khác...">
                                <button type="button" class="btn-add-custom" onclick="toggleCustomInput('Model')">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button class="btn-next" onclick="handleVehicleStep()">Tiếp tục</button>
                </div>
            </div>


            <!-- STEP 1 -->
            <div class="step-content" id="step-1">
                <h3>CHỌN DỊCH VỤ</h3>
                <div id="service-list" class="service-grid"></div>
                <button class="btn-back" onclick="nextStep(0)">Quay lại</button>
                <button class="btn-next" onclick="nextStep(2)">Tiếp tục</button>
            </div>

            <!-- STEP 2 -->
            <div class="step-content" id="step-2">
                <h3>CHỌN PHỤ KIỆN</h3>
                <h3>hoặc bạn có thể bỏ qua</h3>
                <div id="part-list"></div>
                <button class="btn-back" onclick="nextStep(1)">Quay lại</button>
                <button class="btn-next" onclick="nextStep(3)">Tiếp tục</button>
            </div>

            <!-- STEP 3 -->
            <div class="step-content" id="step-3">
                <h3>THÔNG TIN ĐẶT HẸN</h3>

                <form id="booking-form">
                    <input type="text" id="fullName" placeholder="Họ tên *" required>
                    <input type="text" id="phone" placeholder="Số điện thoại *" required>
                    <input type="email" id="email" placeholder="Email">
                    <input type="datetime-local" id="appointmentDateTime" required>
                    <textarea id="note" placeholder="Ghi chú"></textarea>
                    <button class="btn-back" onclick="nextStep(2)">Quay lại</button>
                    <button type="submit" class="btn-submit">
                        Đặt lịch
                    </button>
                </form>

                <div id="booking-message"></div>
            </div>

            <!-- STEP 4 -->
            <div class="step-content" id="step-4">
                <h3>🎉 ĐẶT LỊCH THÀNH CÔNG</h3>
                <p>Hệ thống đã ghi nhận lịch hẹn của bạn.</p>
                <a href="../Dashboard/Index.html">Quay về trang chủ</a>
            </div>
        </div>
    </section>

    <script type="module" src="../../wwwroot/js/common.js"></script>
    <script type="module" src="../../wwwroot/js/appointment/booking-main.js"></script>
    <script type="module">
            import { authGuard } from '../../wwwroot/js/auth/auth-guard.js';
            import CONFIG from '../../wwwroot/js/config.js';

            //authGuard.authorize('Customer'); 
        </script>
</body>
</html>

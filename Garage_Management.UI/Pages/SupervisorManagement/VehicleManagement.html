<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phương tiện - MGMS</title>
    <link rel="stylesheet" href="../../wwwroot/css/supervisor-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="supervisor-container">
        <header class="header">
            <div class="header-top">
                <div class="header-left">
                    <h1 class="brand-title">VEHICLE MANAGEMENT</h1>
                    <p class="user-welcome">Xin chào, <span id="display-name">Người dùng</span></p>
                </div>
                <button id="btn-staff-logout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
            <nav class="header-navigation">
                <a href="../Dashboard/SupervisorDashboard.html" class="nav-btn"><i class="fas fa-tools"></i> Quản lý công việc</a>
                <a href="ServiceManagement.html" class="nav-btn"><i class="fas fa-concierge-bell"></i> Quản lý dịch vụ</a>
                <a href="VehicleManagement.html" class="nav-btn active"><i class="fas fa-car-side"></i> Quản lý phương tiện</a>
                <a href="WorkbayManagement.html" class="nav-btn"><i class="fas fa-warehouse"></i> Quản lý khoang sửa xe</a>
                <a href="statistics.html" class="nav-btn"><i class="fas fa-chart-bar"></i> Thống kê</a>
            </nav>
        </header>

        <div class="tab-container">
            <button class="tab-link active" onclick="openTab('brands')">Thương hiệu (Brands)</button>
            <button class="tab-link" onclick="openTab('models')">Dòng xe (Models)</button>
            <button class="tab-link" onclick="openTab('types')">Loại xe (Types)</button>
        </div>

        <section class="section-box">
            <div class="section-header-flex">
                <h2 id="tab-title" class="section-title">Danh sách Thương hiệu</h2>
                <button class="btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Thêm mới</button>
            </div>

            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr id="table-head">
                            </tr>
                    </thead>
                    <tbody id="vehicle-table-body">
                        </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prev-btn" class="btn-page">Trước</button>
                <span id="page-info">Trang 1</span>
                <button id="next-btn" class="btn-page">Sau</button>
            </div>
        </section>
    </div>

    <div id="vehicle-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Thêm mới</h3>
            <form id="vehicle-form">
                <div id="form-fields"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../../wwwroot/js/vehicle/vehicle-main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Cá Nhân - MGMS</title>
    <link rel="stylesheet" href="../../wwwroot/css/auth.css">
    <link rel="stylesheet" href="../../wwwroot/css/homepage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header id="header-placeholder"></header>

    <div class="container" style="margin-top: 50px; max-width: 1200px;">
        <div class="profile-layout" style="display: flex; gap: 30px; align-items: flex-start;">
            
            <div class="profile-sidebar" style="flex: 1; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <div style="text-align: center; margin-bottom: 20px;">
                    <i class="fa-solid fa-circle-user" style="font-size: 80px; color: #d32f2f;"></i>
                    <h2 id="p-fullname" style="margin-top: 10px;">Đang tải...</h2>
                    <span id="p-role" class="badge" style="background: #eee; padding: 5px 15px; border-radius: 20px; font-size: 12px;">Vai trò</span>
                </div>

                <hr style="border: 0.5px solid #eee; margin: 20px 0;">

                <div class="profile-info-list">
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; color: #666; display: block;">Số điện thoại:</label>
                        <p id="p-phone" style="font-size: 16px;">--</p>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; color: #666; display: block;">Email:</label>
                        <p id="p-email" style="font-size: 16px;">--</p>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; color: #666; display: block;">Ngày tham gia:</label>
                        <p id="p-created" style="font-size: 16px;">--</p>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; color: #666; display: block;">Trạng thái:</label>
                        <p id="p-status" style="font-size: 16px;">--</p>
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn-submit" style="width: 100%;">Chỉnh sửa thông tin</button>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-auth" style="flex: 1; border: 1px solid #ccc; color: #333; padding: 10px; border-radius: 5px;">Đổi mật khẩu</button>
                        <button id="btn-view-bookings" style="flex: 1; background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
                            <i class="fa-solid fa-calendar-check"></i> Xem lịch đặt xe
                        </button>
                    </div>
                </div>
            </div>

            <div class="profile-main-content" style="flex: 1.5; display: flex; flex-direction: column; gap: 20px;">
                
                <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3 style="margin: 0; color: #333;"><i class="fa-solid fa-car"></i> Danh sách xe của bạn</h3>
                        <button id="btn-add-vehicle" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
                            <i class="fa-solid fa-plus"></i> Thêm xe mới
                        </button>
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 2px solid #eee; text-align: left;">
                                <th style="padding: 10px;">Biển số</th>
                                <th style="padding: 10px;">Loại xe</th>
                                <th style="padding: 10px;">Đời xe</th>
                            </tr>
                        </thead>
                        <tbody id="car-list-body">
                            <tr>
                                <td colspan="3" style="padding: 20px; text-align: center; color: #999;">Chưa có dữ liệu xe</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                    <h3 style="margin-bottom: 15px; color: #333;"><i class="fa-solid fa-wrench"></i> Lịch sử sửa chữa</h3>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 2px solid #eee; text-align: left;">
                                <th style="padding: 10px;">Ngày</th>
                                <th style="padding: 10px;">Nội dung</th>
                                <th style="padding: 10px;">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="history-list-body">
                            <tr>
                                <td colspan="3" style="padding: 20px; text-align: center; color: #999;">Chưa có lịch sử sửa chữa</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <div id="change-password-modal" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);">
        <div style="background: white; width: 400px; margin: 10% auto; padding: 25px; border-radius: 8px; position: relative;">
            <span id="close-modal" style="position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 24px;">&times;</span>
            <h3 style="margin-bottom: 20px; color: #d32f2f;">Đổi mật khẩu</h3>
            
            <form id="change-password-form">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Mật khẩu cũ</label>
                    <input type="password" id="oldPassword" class="form-control" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Mật khẩu mới</label>
                    <input type="password" id="newPassword" class="form-control" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" class="form-control" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div id="cpw-msg" style="margin-bottom: 15px; font-size: 14px;"></div>
                <button type="submit" class="btn-submit" style="width: 100%; background: #d32f2f; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">Cập nhật mật khẩu</button>
            </form>
        </div>
    </div>

    <div id="add-vehicle-modal" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);">
        <div style="background: white; width: 450px; margin: 5% auto; padding: 25px; border-radius: 8px; position: relative;">
            <span id="close-vehicle-modal" style="position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 24px;">&times;</span>
            <h3 style="margin-bottom: 20px; color: #28a745;">Đăng ký xe mới</h3>
            
            <form id="add-vehicle-form">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Mẫu xe (Model)</label>
                    <select id="v-model" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"></select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Biển số xe</label>
                    <input type="text" id="v-plate" placeholder="VD: 29A-12345" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom:5px;">Năm sản xuất</label>
                        <input type="number" id="v-year" value="2024" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom:5px;">Số khung (VIN)</label>
                        <input type="text" id="v-vin" placeholder="Tùy chọn" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>
                <div id="v-msg" style="margin-bottom: 15px; font-size: 14px;"></div>
                <button type="submit" class="btn-submit" style="width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Xác nhận thêm xe</button>
            </form>
        </div>
    </div>

    <script src="../../wwwroot/js/common.js"></script>
    <script type="module" src="../../wwwroot/js/auth/profile-main.js"></script>
</body>

</html>
